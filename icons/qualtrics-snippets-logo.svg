<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Window body -->
  <rect width="48" height="48" rx="7" fill="#1c1c1e"/>
  <!-- Page -->
  <rect x="8" y="9" width="32" height="32" rx="3" fill="#2c2c2e"/>
  <!-- Clip tab at top -->
  <rect x="17" y="6" width="14" height="6" rx="2" fill="#3a3a3c"/>
  <!-- Row 1: filled radio + line -->
  <circle cx="15" cy="20" r="3" stroke="#888" stroke-width="1.4" fill="none"/>
  <circle cx="15" cy="20" r="1.3" fill="#4fc3f7"/>
  <line x1="21" y1="20" x2="36" y2="20" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Row 2: empty radio + line -->
  <circle cx="15" cy="28" r="3" stroke="#888" stroke-width="1.4" fill="none"/>
  <line x1="21" y1="28" x2="36" y2="28" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Row 3: empty radio + line -->
  <circle cx="15" cy="36" r="3" stroke="#888" stroke-width="1.4" fill="none"/>
  <line x1="21" y1="36" x2="36" y2="36" stroke="#555" stroke-width="1.8" stroke-linecap="round"/>
</svg>
